server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Emit relative Location headers so redirects preserve scheme+host+port
    # as seen by the browser (works correctly behind upstream proxies).
    absolute_redirect off;

    # Redirect root to the base path
    location = / {
        return 302 /middleware-core/;
    }

    # Serve the Docusaurus site under the /middleware-core context
    location /middleware-core/ {
        try_files $uri $uri/ $uri.html /middleware-core/index.html;
    }

    # Long cache for hashed assets
    location ~* ^/middleware-core/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Do not cache HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;
}
