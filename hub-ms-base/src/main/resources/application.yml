logging:
  config: classpath:logback-spring.xml
  file:
    # LOG_DIR/LOG_FILE son el contrato de deploy (002-base-service.yml los inyecta;
    # en contenedor: /app/logs bind-mounteado). Default local: logs/ relativo.
    name: ${LOG_DIR:logs}/${LOG_FILE:${spring.application.name}.log}
  pattern:
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%15.15t] %X{traceId} %logger{39} : %m%n%wEx"
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr([%15.15t]){faint} %clr(%X{traceId}){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m %n%wEx"

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true
    vault:
      enabled: false  # Deshabilitado temporalmente

spring:
  application:
    name: hub-ms-base

  autoconfigure:
    exclude:
      - bo.com.sintesis.hub.audit.config.AuditAutoConfiguration

  config:
    import: "optional:consul:,optional:vault:,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:hub-base}/system/database?prefix=system.database.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:hub-base}/system/redis?prefix=system.redis.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:hub-base}/keycloak/service-client?prefix=keycloak.service-client.,optional:classpath:git.properties"

  cloud:
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: ${VAULT_AUTHENTICATION:TOKEN}
      token: ${VAULT_TOKEN:root}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
      kv:
        enabled: true
        backend: secret
        default-context: hub-base
        application-name: hub-base
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        prefix: config
        default-context: hub-base
        format: KEY_VALUE
        watch:
          enabled: true
          delay: 10000
      discovery:
        enabled: true
        # El gateway discovery locator espera este nombre para rutas /services/hubbaseservice/**
        # y /partner/v1/** (rewrite → /api/**).
        service-name: hubbaseservice
        instance-id: ${spring.application.name}:${random.value}
        healthCheckPath: /management/health/readiness
        health-check-interval: 15s
        prefer-ip-address: true

  datasource:
    url: jdbc:postgresql://${system.database.host:localhost}:${system.database.port:5432}/${system.database.name:hub_base}
    username: ${system.database.username:postgres}
    password: ${system.database.password:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate: {}
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  data:
    redis:
      host: ${system.redis.host:localhost}
      port: ${system.redis.port:6379}
      password: ${system.redis.password:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${application.keycloak.external-url}/realms/${application.keycloak.realm}
          jwk-set-uri: ${application.keycloak.auth-server-url}/realms/${application.keycloak.realm}/protocol/openid-connect/certs

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
    use-code-as-default-message: true

  output:
    ansi:
      enabled: always

server:
  port: 8081
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    oauth:
      client-id: ${application.keycloak.resource}
      client-secret: ${application.keycloak.credentials.secret}
      use-pkce-with-authorization-code-grant: true
      scopes: openid profile
  show-actuator: false

# ─── Application Properties (type-safe via ApplicationProperties.java) ───
application:
  gateway-url: ${GATEWAY_URL:http://localhost:8090}
  keycloak:
    auth-server-url: ${keycloak.service-client.auth-server-url:http://localhost:8180}
    external-url: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8180}
    # Realm para APIs internas (frontend admin). Las APIs externas (partner)
    # usan hub-partner — se configura el decoder multi-issuer en SecurityConfiguration.
    realm: ${keycloak.service-client.realm:hub-admin}
    resource: ${keycloak.service-client.client-id:hubadminservice}
    credentials:
      secret: ${keycloak.service-client.client-secret:hubadminservice-secret}

  # ─── Token de desarrollo local (fallback para EfxRateClient sin Vault) ──────
  local-dev-token:
    api-key: ${LOCAL_DEV_API_KEY:}

# ─── Hub de interoperabilidad (adaptadores outbound) ─────────────────────────
hub:
  # ─── Plano de control declarativo (ADR-0007) ─────────────────────────────
  # Agregar una API = un bloque en hub.apis (+ scope en Keycloak). Cero código.
  # Cada API declara exactamente uno de: adapter-bean (InboundPort custom) o
  # connector (destino HTTP genérico declarado en hub.connectors).
  apis:
    caso-penal-v1:
      product: CASO_PENAL
      version: v1
      method: POST
      adapter-bean: stubInboundAdapter    # reemplazar por connector cuando exista la app de negocio
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: cud,                        type: STRING,   required: true,  max-length: 50 }
        - { name: id_externo_caso,            type: INTEGER,  required: true }
        - { name: id_tipo_denuncia,           type: INTEGER,  required: true }
        - { name: id_oficina,                 type: INTEGER,  required: true }
        - { name: id_estado,                  type: INTEGER,  required: true }
        - { name: id_etapa,                   type: INTEGER,  required: true }
        - { name: id_externo_caso_referencia, type: INTEGER,  required: false }
        - { name: es_reservado,               type: BOOLEAN,  required: false }
        - { name: id_municipio,               type: INTEGER,  required: false }
        - { name: zona,                       type: STRING,   required: false, max-length: 255 }
        - { name: direccion,                  type: STRING,   required: false }
        - { name: latitud,                    type: STRING,   required: false, max-length: 30 }
        - { name: longitud,                   type: STRING,   required: false, max-length: 30 }
        - { name: referencia,                 type: STRING,   required: false }
        - { name: relato,                     type: STRING,   required: false }
        - { name: fecha_caso,                 type: DATETIME, required: false, format: iso8601 }
        - { name: fecha_fin,                  type: DATETIME, required: false, format: iso8601 }
        - { name: fecha_aproximada,           type: STRING,   required: false, max-length: 255 }
        - { name: denominacion_caso,          type: STRING,   required: false, max-length: 500 }
        - { name: tags,                       type: ARRAY,    required: false }
    caso-penal-editar-v1:
      product: CASO_PENAL_EDITAR
      version: v1
      method: PATCH
      adapter-bean: stubInboundAdapter
      resource-id-field: id_pol_caso        # el dispatcher inyecta el {id} del path aquí
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: id_tipo_denuncia,           type: INTEGER,  required: true }
        - { name: id_externo_caso_referencia, type: INTEGER,  required: false }
        - { name: id_municipio,               type: INTEGER,  required: false }
        - { name: zona,                       type: STRING,   required: false, max-length: 255 }
        - { name: direccion,                  type: STRING,   required: false }
        - { name: latitud,                    type: STRING,   required: false, max-length: 30 }
        - { name: longitud,                   type: STRING,   required: false, max-length: 30 }
        - { name: referencia,                 type: STRING,   required: false }
        - { name: relato,                     type: STRING,   required: false }
        - { name: fecha_caso,                 type: DATETIME, required: false, format: iso8601 }
        - { name: fecha_fin,                  type: DATETIME, required: false, format: iso8601 }
        - { name: fecha_aproximada,           type: STRING,   required: false, max-length: 255 }
        - { name: denominacion_caso,          type: STRING,   required: false, max-length: 500 }
        - { name: tags,                       type: ARRAY,    required: false }
  outbound:
    efxrate:
      url: https://api.efxrate.example.com
      timeout-ms: 5000
      vault-path: hub-base/data/efxrate/api-key
      cache-ttl-minutes: 60
      resilience4j:
        retry-max-attempts: 3
        retry-wait-ms: 500
        cb-failure-rate-threshold: 50
        cb-wait-duration-ms: 30000
        bulkhead-max-concurrent: 10
