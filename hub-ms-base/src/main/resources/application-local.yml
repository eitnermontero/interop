    catalogo-estados-v1:
      product: CATALOGO_ESTADOS
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/estados
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-etapas-v1:
      product: CATALOGO_ETAPAS
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/etapas
