server:
  port: 8091

spring:
  # IMPORTANTE: Deshabilitar completamente config.import
  config:
    import: ""

  cloud:
    # Deshabilitar Vault para desarrollo local
    vault:
      enabled: false
      config:
        lifecycle:
          enabled: false
    # Consul config deshabilitado; discovery habilitado para que el gateway resuelva lb://
    consul:
      enabled: true
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: true

  # Configuración de base de datos local
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/hub_base
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none  # Dejar que Liquibase maneje el schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Liquibase para crear tablas
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    drop-first: false
    default-schema: public
    liquibase-schema: public
    database-change-log-table: databasechangelog
    database-change-log-lock-table: databasechangeloglock

  # Deshabilitar Flyway explícitamente
  flyway:
    enabled: false

  # Configuración de Redis local
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # Seguridad OAuth2 - Keycloak local
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:127.0.0.1}:${KEYCLOAK_PORT:8180}/realms/hub-admin
          jwk-set-uri: http://${KEYCLOAK_HOST:127.0.0.1}:${KEYCLOAK_PORT:8180}/realms/hub-admin/protocol/openid-connect/certs

# Configuración de la aplicación
application:
  # Token de desarrollo local — fallback para EfxRateClient cuando Vault está deshabilitado
  local-dev-token:
    api-key: ${LOCAL_DEV_API_KEY:dev-token-123456}

# ─── Hub outbound — override local ──────────────────────────────────────────
# En local, el WireMock arranca en 8089 durante los tests de integración.
# Para desarrollo manual sin WireMock, dejar la URL de ejemplo (fallará con connection refused,
# que es el comportamiento esperado sin el proveedor real).
hub:
  # ─── API FAKE de prueba (ADR-0007): declarada 100% por configuración ──────
  # Valida el registro declarativo: cero código, el adaptador HTTP genérico
  # reenvía al backend fake local (scratchpad, puerto 9099).
  connectors:
    backend-fake:
      base-url: http://127.0.0.1:9099
      timeout-ms: 3000
  apis:
    orden-fake-v1:
      product: ORDEN_FAKE
      version: v1
      method: POST
      connector: backend-fake
      target-path: /ordenes
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: codigo,      type: STRING,  required: true,  max-length: 20 }
        - { name: monto,       type: INTEGER, required: true }
        - { name: descripcion, type: STRING,  required: false, max-length: 200 }
  inbound:
    # Activa el StubInboundAdapter para CASO_PENAL/v1 en lugar del adaptador real.
    # NUNCA poner true en producción.
    stub-mode: true
  outbound:
    efxrate:
      url: http://localhost:8089
      vault-path: hub-base/data/efxrate/api-key

# Logging más verboso en local
logging:
  level:
    bo.com.sintesis.hub.base: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    com.zaxxer.hikari: DEBUG
    liquibase: DEBUG
    liquibase.changelog: DEBUG
    liquibase.database: DEBUG
    liquibase.executor: DEBUG
