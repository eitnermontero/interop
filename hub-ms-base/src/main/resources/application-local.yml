    catalogo-situaciones-legales-v1:
      product: CATALOGO_SITUACIONES_LEGALES
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/situaciones-legales
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-tamanos-documento-v1:
      product: CATALOGO_TAMANOS_DOCUMENTO
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/tamanos-documento
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-tipos-v1:
      product: CATALOGO_TIPOS
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/tipos
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-tipos-persona-v1:
      product: CATALOGO_TIPOS_PERSONA
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/tipos-persona
