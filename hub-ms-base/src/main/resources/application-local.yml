    catalogo-unidades-v1:
      product: CATALOGO_UNIDADES
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/unidades
      required-scope: https://api.sintesis.com.bo/caso.penal
  inbound:
    # Activa el StubInboundAdapter para CASO_PENAL/v1 en lugar del adaptador real.
    # NUNCA poner true en producción.
    stub-mode: true
  outbound:
    efxrate:
      url: http://localhost:8089
      vault-path: hub-base/data/efxrate/api-key

# Logging más verboso en local
logging:
  level:
    bo.com.sintesis.hub.base: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    com.zaxxer.hikari: DEBUG
    liquibase: DEBUG
    liquibase.changelog: DEBUG
    liquibase.database: DEBUG
    liquibase.executor: DEBUG
