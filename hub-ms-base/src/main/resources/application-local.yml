      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/caracteristicas
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-clases-v1:
      product: CATALOGO_CLASES
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/clases
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-contenidos-bien-v1:
      product: CATALOGO_CONTENIDOS_BIEN
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/contenidos-bien
