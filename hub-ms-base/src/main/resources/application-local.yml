server:
  port: 8091

spring:
  # IMPORTANTE: Deshabilitar completamente config.import
  config:
    import: ""

  cloud:
    # Deshabilitar Vault para desarrollo local
    vault:
      enabled: false
      config:
        lifecycle:
          enabled: false
    # Consul config deshabilitado; discovery habilitado para que el gateway resuelva lb://
    consul:
      enabled: true
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: true

  # Configuración de base de datos local
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/hub_base
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none  # Dejar que Liquibase maneje el schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Liquibase para crear tablas
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    drop-first: false
    default-schema: public
    liquibase-schema: public
    database-change-log-table: databasechangelog
    database-change-log-lock-table: databasechangeloglock

  # Deshabilitar Flyway explícitamente
  flyway:
    enabled: false

  # Configuración de Redis local
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # Seguridad OAuth2 - Keycloak local
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:127.0.0.1}:${KEYCLOAK_PORT:8180}/realms/hub-admin
          jwk-set-uri: http://${KEYCLOAK_HOST:127.0.0.1}:${KEYCLOAK_PORT:8180}/realms/hub-admin/protocol/openid-connect/certs

# Configuración de la aplicación
application:
  # Token de desarrollo local — fallback para EfxRateClient cuando Vault está deshabilitado
  local-dev-token:
    api-key: ${LOCAL_DEV_API_KEY:dev-token-123456}

# ─── Hub outbound — override local ──────────────────────────────────────────
# En local, el WireMock arranca en 8089 durante los tests de integración.
# Para desarrollo manual sin WireMock, dejar la URL de ejemplo (fallará con connection refused,
# que es el comportamiento esperado sin el proveedor real).
hub:
  # ─── API FAKE de prueba (ADR-0007): declarada 100% por configuración ──────
  # Valida el registro declarativo: cero código, el adaptador HTTP genérico
  # reenvía al backend fake local (scratchpad, puerto 9099).
  connectors:
    backend-fake:
      base-url: http://127.0.0.1:9099
      timeout-ms: 3000
    # backend-fiscalia también está declarado en application.yml (base, junto
    # con caso-penal-v1/caso-penal-editar-v1) — se repite aquí (mismo valor)
    # solo para que deploy/scripts/hub-api.sh valide este archivo de forma
    # standalone sin conocer la base; en runtime Spring lo resuelve igual.
    backend-fiscalia:
      base-url: http://172.16.76.20:3333
      timeout-ms: 8000
  apis:
    orden-fake-v1:
      product: ORDEN_FAKE
      version: v1
      method: POST
      connector: backend-fake
      target-path: /ordenes
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: codigo,      type: STRING,  required: true,  max-length: 20 }
        - { name: monto,       type: INTEGER, required: true }
        - { name: descripcion, type: STRING,  required: false, max-length: 200 }

    caso-penal-delito-v1:
      product: CASO_PENAL_DELITO
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/casos/{pol_caso_id}/delitos
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_id, type: INTEGER, required: true }
        - { name: delitos,     type: ARRAY,   required: true }

    caso-penal-delito-editar-v1:
      product: CASO_PENAL_DELITO_EDITAR
      version: v1
      method: PATCH
      resource-id-field: pol_caso_delito_id
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/delitos/{pol_caso_delito_id}
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_delito_id, type: INTEGER, required: true }
        - { name: es_principal,       type: BOOLEAN, required: false }
        - { name: es_tentativo,       type: BOOLEAN, required: false }
        - { name: estado,             type: INTEGER, required: false }

    caso-penal-sujeto-v1:
      product: CASO_PENAL_SUJETO
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/casos/{pol_caso_id}/sujetos
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_id, type: INTEGER, required: true }
        - { name: sujetos,     type: ARRAY,   required: true }

    caso-penal-sujeto-editar-v1:
      product: CASO_PENAL_SUJETO_EDITAR
      version: v1
      method: PATCH
      resource-id-field: pol_caso_persona_id
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/sujetos/{pol_caso_persona_id}
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_persona_id,    type: INTEGER, required: true }
        - { name: tipo_sujeto_id,         type: ARRAY,   required: true }
        - { name: parentesco_victima_id,  type: INTEGER, required: false }
        - { name: es_querellante,         type: BOOLEAN, required: false }
        - { name: estado,                 type: INTEGER, required: false }

    caso-penal-abogado-v1:
      product: CASO_PENAL_ABOGADO
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/sujetos/{pol_caso_persona_id}/abogados
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_persona_id, type: INTEGER, required: true }
        - { name: abogados,            type: ARRAY,   required: true }

    caso-penal-abogado-editar-v1:
      product: CASO_PENAL_ABOGADO_EDITAR
      version: v1
      method: PATCH
      resource-id-field: pol_caso_persona_abogado_id
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/abogados/{pol_caso_persona_abogado_id}
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_persona_abogado_id, type: INTEGER, required: true }
        - { name: estado,                      type: INTEGER, required: true }
        - { name: motivo_baja,                 type: STRING,  required: false }

    caso-penal-situacion-juridica-v1:
      product: CASO_PENAL_SITUACION_JURIDICA
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/sujetos/{pol_caso_persona_id}/situaciones-juridicas
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_persona_id,     type: INTEGER, required: true }
        - { name: situaciones_juridicas,   type: ARRAY,   required: true }

    caso-penal-domicilio-v1:
      product: CASO_PENAL_DOMICILIO
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/sujetos/{pol_caso_persona_id}/domicilios
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_persona_id,      type: INTEGER, required: true }
        - { name: mp_persona_domicilio_id,  type: INTEGER, required: true }
        - { name: pais_id,                  type: INTEGER, required: true }
        - { name: municipio_id,             type: INTEGER, required: false }
        - { name: direccion,                type: STRING,  required: false }
        - { name: latitud,                  type: STRING,  required: false }
        - { name: longitud,                 type: STRING,  required: false }

    caso-penal-fiscal-v1:
      product: CASO_PENAL_FISCAL
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/casos/{pol_caso_id}/fiscales
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_id, type: INTEGER, required: true }
        - { name: fiscales,    type: ARRAY,   required: true }

    caso-penal-fiscal-editar-v1:
      product: CASO_PENAL_FISCAL_EDITAR
      version: v1
      method: PATCH
      resource-id-field: pol_caso_funcionario_id
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/fiscales/{pol_caso_funcionario_id}
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_funcionario_id, type: INTEGER, required: true }
        - { name: estado,                  type: INTEGER, required: true }

    caso-penal-actividad-v1:
      product: CASO_PENAL_ACTIVIDAD
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/casos/{pol_caso_id}/actividades
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_id,  type: INTEGER, required: true }
        - { name: actividades,  type: ARRAY,   required: true }

    caso-penal-reserva-v1:
      product: CASO_PENAL_RESERVA
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/reservas
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: estado,             type: INTEGER,  required: true }
        - { name: tabla,              type: INTEGER,  required: true }
        - { name: tabla_id,           type: INTEGER,  required: true }
        - { name: fecha_fin_reserva,  type: DATETIME, required: false, format: iso8601 }

    caso-penal-juzgado-v1:
      product: CASO_PENAL_JUZGADO
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/casos/juzgado
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_id, type: INTEGER, required: true }
        - { name: juzgado_id,  type: INTEGER, required: true }

    caso-penal-sujeto-juzgado-v1:
      product: CASO_PENAL_SUJETO_JUZGADO
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/sujetos/juzgado
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_persona_ids, type: ARRAY,   required: true }
        - { name: juzgado_id,           type: INTEGER, required: true }

    caso-penal-agenda-v1:
      product: CASO_PENAL_AGENDA
      version: v1
      method: POST
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/casos/{pol_caso_id}/agendas
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_caso_id,             type: INTEGER,  required: true }
        - { name: oj_audiencia_id,         type: INTEGER,  required: true }
        - { name: oj_audiencia_detalle_id, type: INTEGER,  required: true }
        - { name: tipo_audiencia_id,       type: INTEGER,  required: true }
        - { name: tipo_actividad_id,       type: INTEGER,  required: true }
        - { name: juzgado_id,              type: INTEGER,  required: true }
        - { name: sala_audiencia_id,       type: INTEGER,  required: true }
        - { name: estado_audiencia_id,     type: INTEGER,  required: true }
        - { name: modalidad,               type: INTEGER,  required: false }
        - { name: fecha_hora_inicio,       type: DATETIME, required: true, format: iso8601 }
        - { name: fecha_hora_fin,          type: DATETIME, required: true, format: iso8601 }
        - { name: descripcion,             type: STRING,   required: true }
        - { name: latitud,                 type: STRING,   required: false }
        - { name: longitud,                type: STRING,   required: false }
        - { name: direccion,               type: STRING,   required: false }
        - { name: enlace_audiencia,        type: STRING,   required: false }
        - { name: mp_caso_persona_ids,     type: ARRAY,    required: false }

    caso-penal-agenda-editar-v1:
      product: CASO_PENAL_AGENDA_EDITAR
      version: v1
      method: PATCH
      resource-id-field: pol_agenda_id
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/agendas/{pol_agenda_id}
      required-scope: https://api.sintesis.com.bo/caso.penal
      fields:
        - { name: pol_agenda_id,                 type: INTEGER,  required: true }
        - { name: mp_audiencia_detalle_id,       type: INTEGER,  required: false }
        - { name: tipo_audiencia_id,             type: INTEGER,  required: false }
        - { name: tipo_actividad_id,             type: INTEGER,  required: false }
        - { name: juzgado_id,                    type: INTEGER,  required: false }
        - { name: sala_audiencia_id,             type: INTEGER,  required: false }
        - { name: estado_audiencia_id,           type: INTEGER,  required: false }
        - { name: modalidad,                     type: INTEGER,  required: false }
        - { name: fecha_hora_inicio,             type: DATETIME, required: false, format: iso8601 }
        - { name: fecha_hora_fin,                type: DATETIME, required: false, format: iso8601 }
        - { name: descripcion,                   type: STRING,   required: false }
        - { name: latitud,                       type: STRING,   required: false }
        - { name: longitud,                      type: STRING,   required: false }
        - { name: direccion,                     type: STRING,   required: false }
        - { name: fecha_hora_inicio_grabacion,   type: DATETIME, required: false, format: iso8601 }
        - { name: duracion_grabacion,            type: STRING,   required: false }
        - { name: enlace_audiencia,              type: STRING,   required: false }
        - { name: archivo_extension,             type: STRING,   required: false }
        - { name: archivo_enlace,                type: STRING,   required: false }
        - { name: archivo_tamano,                type: INTEGER,  required: false }
        - { name: archivo_hash,                  type: STRING,   required: false }
        - { name: suspencion_audiencia_id,       type: INTEGER,  required: false }
        - { name: observaciones,                 type: STRING,   required: false }
        - { name: estado,                        type: INTEGER,  required: false }
        - { name: mp_caso_persona_ids,           type: ARRAY,    required: false }

    catalogo-bienes-v1:
      product: CATALOGO_BIENES
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/bienes
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-calidades-bien-v1:
      product: CATALOGO_CALIDADES_BIEN
      version: v1
      method: GET
      connector: backend-fiscalia
      target-path: /api/v1/external/fiscalia/catalogos/calidades-bien
      required-scope: https://api.sintesis.com.bo/caso.penal

    catalogo-caracteristicas-v1:
