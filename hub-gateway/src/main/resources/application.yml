logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus

spring:
  application:
    name: hub-gateway

  config:
    # Vault paths:
    #   keycloak/service-client  → admin realm OIDC client (hubadminservice)
    #   keycloak/partner-client  → partner realm client credentials (hub-partner token proxy)
    import: "optional:consul:,optional:vault:,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:hub-base}/system/redis?prefix=system.redis.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:hub-base}/keycloak/service-client?prefix=keycloak.service-client.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:hub-base}/keycloak/partner-client?prefix=keycloak.partner-client.,optional:classpath:git.properties"

  cloud:
    # LB cache TTL alto → tolera caídas temporales de Consul (default 35s da 503).
    loadbalancer:
      cache:
        ttl: 1h
        capacity: 256
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: ${VAULT_AUTHENTICATION:TOKEN}
      token: ${VAULT_TOKEN:root}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
      kv:
        enabled: true
        backend: secret
        default-context: hub-base
        application-name: hub-base
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        prefix: config
        default-context: hub-base
        format: KEY_VALUE
        watch:
          enabled: true
          delay: 10000
      discovery:
        enabled: true
        healthCheckPath: /management/health/readiness
        service-name: ${spring.application.name}
        instance-id: ${spring.application.name}
        prefer-ip-address: true
        fail-fast: false
        register: true
        deregister: true
        tags:
          - profile=${spring.profiles.active}
          - version=@project.version@
          - git-version=${git.commit.id.describe:}
          - git-commit=${git.commit.id.abbrev:}
          - git-branch=${git.branch:}
          - context-path=${server.servlet.context-path:}
        heartbeat:
          enabled: true
          ttl: 10s
          reregister-service-on-failure: true
        # Sin watch las routes quedan cacheadas con IPs viejas tras reinicio de un upstream.
        catalog-services-watch:
          enabled: true
          delay: 15000
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            # Retry solo GETs (POST no es idempotente).
            - name: Retry
              args:
                retries: 8
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                exceptions:
                  - java.io.IOException
                  - java.util.concurrent.TimeoutException
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 2000ms
                  factor: 2
                  basedOnPreviousValue: false
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
              # Aislamiento multi-tenant: solo crea routes para services con el sufijo
              # del propio tenant. Sin TENANT_ID = no-op (single-tenant).
              include-expression: "'${TENANT_ID:}'.length() == 0 || serviceId.toLowerCase().endsWith('-${TENANT_ID:}')"
              predicates:
                # Path publico sin sufijo de tenant: /services/<svc>/** → lb://<svc>-<tenant>.
                - name: Path
                  args:
                    pattern: "'/services/'+serviceId.toLowerCase().replace('-${TENANT_ID:__NOTENANT__}', '')+'/**'"
              filters:
                - StripPrefix=2
          httpclient:
            connect-timeout: 500
            response-timeout: 5s
            pool:
              max-connections: 1000
          routes:
            # ─── Swagger / OpenAPI aggregation ─────────────────────────────
            - id: admin-service-api-docs
              uri: lb://hubadminservice
              predicates:
                - Path=/v3/api-docs/admin-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /v3/api-docs/admin-service
                    replacement: /v3/api-docs
            - id: base-service-api-docs
              uri: lb://hubbaseservice
              predicates:
                - Path=/v3/api-docs/base-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /v3/api-docs/base-service
                    replacement: /v3/api-docs

            # ─── Partner token endpoint proxy ───────────────────────────────
            # Los partners hacen POST /oauth2/token con grant_type=client_credentials.
            # El gateway reescribe el path al token endpoint del realm hub-partner.
            - id: partner-token-proxy
              uri: ${application.partner-keycloak.auth-server-url}
              predicates:
                - Path=/oauth2/token
                - Method=POST
              filters:
                - name: RewritePath
                  args:
                    regexp: /oauth2/token
                    replacement: /realms/hub-partner/protocol/openid-connect/token

            # ─── Partner interop API ─────────────────────────────────────────
            # /partner/v1/** → lb://hubbaseservice/api/**
            # Las rutas de partner son validadas por el chain partnerSecurityChain (Order=1).
            - id: partner-interop-api
              uri: lb://hubbaseservice
              predicates:
                - Path=/partner/v1/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /partner/v1/(?<segment>.*)
                    replacement: /api/${segment}

  data:
    redis:
      host: ${system.redis.host:localhost}
      port: ${system.redis.port:6379}
      password: ${system.redis.password:}
      timeout: 5000ms

  session:
    store-type: redis
    redis:
      namespace: hub-gateway:session

  # spring.security.oauth2.resourceserver.jwt — removed.
  # Los decoders (adminJwtDecoder / partnerJwtDecoder) se construyen programáticamente
  # en SecurityConfiguration a partir de ApplicationProperties, usando las URLs
  # de cada realm directamente. No se necesita config declarativa aquí.

  output:
    ansi:
      enabled: always

server:
  port: 8080
  forward-headers-strategy: NATIVE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Gateway
        url: /v3/api-docs
      - name: Admin Service
        url: /v3/api-docs/admin-service
      - name: Base Service
        url: /v3/api-docs/base-service
    operations-sorter: method
    tags-sorter: alpha
    oauth:
      client-id: ${application.keycloak.resource}
      client-secret: ${application.keycloak.credentials.secret}
      use-pkce-with-authorization-code-grant: true
      scopes: openid profile

# ─── Application Properties (type-safe via ApplicationProperties.java) ───
application:
  # ─── Admin realm (hub-admin) — SPA + internal APIs ─────────────────────
  # Vault path: keycloak/service-client
  keycloak:
    auth-server-url: ${keycloak.service-client.auth-server-url:http://localhost:8180}
    external-url: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8180}
    realm: ${keycloak.service-client.realm:hub-admin}
    resource: ${keycloak.service-client.client-id:hubadminservice}
    credentials:
      secret: ${keycloak.service-client.client-secret:hubadminservice-secret}

  # ─── Partner realm (hub-partner) — M2M APIs externas ───────────────────
  # Vault path: keycloak/partner-client
  # authServerUrl es la URL interna (gateway → Keycloak dentro del Docker network).
  # externalUrl es la URL que los partners usan para el issuer claim.
  partner-keycloak:
    auth-server-url: ${keycloak.partner-client.auth-server-url:http://localhost:8180}
    external-url: ${KEYCLOAK_PARTNER_EXTERNAL_URL:http://localhost:8180}
    realm: ${keycloak.partner-client.realm:hub-partner}
    resource: ${keycloak.partner-client.client-id:unilink-api}
    credentials:
      secret: ${keycloak.partner-client.client-secret:unilink-api-secret}

  cors:
    allowed-origins: http://localhost:3000,http://localhost:4300
    allowed-methods: "*"
    allowed-headers: "*"
    exposed-headers: Authorization,Link,X-Total-Count
    allow-credentials: true
    max-age: 1800
  gateway:
    rate-limit:
      default-requests-per-minute: 100
    cart-service-name: hubbaseservice
