<div>
  <app-page-breadcrumb pageTitle="Consulta de Pendientes SOBOCE" />

  <app-card padding="md" class="mb-6">
    <div class="flex flex-wrap gap-4 items-end">
      <div class="flex flex-col gap-1.5">
        <app-label>Código Cliente</app-label>
        <app-input-field type="text" [value]="codigoCliente()" placeholder="Ej: 284996778" className="w-52" (valueChange)="codigoCliente.set($event.toString())" />
      </div>
      <app-button variant="primary" [startIcon]="iconSearch" [disabled]="loading()" (btnClick)="onBuscar()">Buscar</app-button>
    </div>
  </app-card>

  @if (loading()) {
    <app-card class="flex items-center justify-center py-8" [attr.aria-busy]="true" [attr.aria-label]="'Cargando pendientes...'">
      <app-spinner size="md" color="brand" [ariaHidden]="true"></app-spinner>
    </app-card>
  }
  @if (error()) { <div class="mb-4"><app-alert variant="error" title="Error al consultar los pendientes" [message]="error() ?? ''" /></div> }
  @if (!buscado() && !loading()) { <app-alert variant="info" title="Sin búsqueda activa" message="Ingrese el código de cliente y presione Buscar." /> }
  @if (buscado() && !loading() && !error() && !hayResultados()) { <app-alert variant="warning" title="Sin registros" message="No se encontraron deudas pendientes." /> }

  @if (buscado() && !loading() && hayResultados()) {
    <app-data-table [columns]="columns" [data]="resultados()" />
  }
</div>
