logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

spring:
  application:
    name: mdqr-ms-auth

  config:
    # Vault paths (namespace: secret/mdqr-auth):
    #   keycloak/service-client  → OIDC client del admin realm (mdqradminservice)
    #   keycloak/admin-client    → client con permisos realm-management para Keycloak Admin API
    import: "optional:consul:,optional:vault:,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:mdqr-auth}/system/database?prefix=system.database.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:mdqr-auth}/system/redis?prefix=system.redis.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:mdqr-auth}/keycloak/service-client?prefix=keycloak.service-client.,optional:vault://${VAULT_MOUNT:secret}/${VAULT_NS:mdqr-auth}/keycloak/admin-client?prefix=keycloak.admin-client.,optional:classpath:git.properties"

  cloud:
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: ${VAULT_AUTHENTICATION:TOKEN}
      token: ${VAULT_TOKEN:root}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
      kv:
        enabled: true
        backend: secret
        default-context: mdqr-auth
        application-name: mdqr-auth
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        prefix: config
        default-context: mdqr-auth
        format: KEY_VALUE
        watch:
          enabled: true
          delay: 10000
      discovery:
        enabled: true
        # Heartbeat passive: en setups multi-tenant Consul no alcanza el IP interno del
        # container, por lo que el HTTP active check no funciona — la app pinguea.
        healthCheckPath: /management/health/readiness
        # El gateway discovery locator y el SDK del frontend esperan este nombre.
        service-name: mdqradminservice
        instance-id: ${spring.application.name}
        prefer-ip-address: true
        fail-fast: false
        register: true
        deregister: true
        tags:
          - profile=${spring.profiles.active}
          - version=@project.version@
          - git-version=${git.commit.id.describe:}
          - git-commit=${git.commit.id.abbrev:}
          - git-branch=${git.branch:}
          - context-path=${server.servlet.context-path:}
        heartbeat:
          enabled: true
          ttl: 10s
          reregister-service-on-failure: true
        catalog-services-watch:
          enabled: false

  datasource:
    url: jdbc:postgresql://${system.database.host:localhost}:${system.database.port:5432}/${system.database.name:mdqr_auth}
    username: ${system.database.username:postgres}
    password: ${system.database.password:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      # Tablas + tracking del admin aislados en el schema 'admin'. PRESERVAR.
      hibernate.default_schema: admin
      hibernate.jdbc.time_zone: UTC
      hibernate.timezone.default_storage: NORMALIZE
      hibernate.connection.provider_disables_autocommit: true
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.query.fail_on_pagination_over_collection_fetch: true
      hibernate.query.in_clause_parameter_padding: true
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    # Tablas + tracking del admin aislados en el schema 'admin'. El schema lo crea
    # LiquibaseConfiguration antes del lock (rompe el catch-22 en BD limpia).
    default-schema: admin
    liquibase-schema: admin

  data:
    redis:
      host: ${system.redis.host:localhost}
      port: ${system.redis.port:6379}
      password: ${system.redis.password:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  security:
    oauth2:
      resourceserver:
        jwt:
          # Realm mdqr-admin: tokens emitidos por la SPA y service accounts internos.
          issuer-uri: ${application.keycloak.external-url}/realms/${application.keycloak.realm}
          jwk-set-uri: ${application.keycloak.auth-server-url}/realms/${application.keycloak.realm}/protocol/openid-connect/certs

  messages:
    fallback-to-system-locale: false
    use-code-as-default-message: true

  output:
    ansi:
      enabled: always

server:
  port: 8083

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    oauth:
      client-id: ${application.keycloak.client-id}
      client-secret: ${application.keycloak.credentials.secret}
      use-pkce-with-authorization-code-grant: true
      scopes: openid profile

# ─── Application Properties (type-safe via ApplicationProperties.java) ───
application:
  gateway-url: http://localhost:8080
  keycloak:
    auth-server-url: ${keycloak.service-client.auth-server-url:http://localhost:8180}
    external-url: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8180}
    realm: ${keycloak.service-client.realm:mdqr-admin}
    client-id: ${keycloak.service-client.client-id:mdqradminservice}
    credentials:
      secret: ${keycloak.service-client.client-secret:mdqradminservice-secret}
    # Service account credentials used to invoke Keycloak Admin API.
    # The client must have realm-management roles: manage-users, view-users,
    # query-users, query-clients, view-realm, manage-realm.
    admin:
      auth-server-url: ${keycloak.admin-client.auth-server-url:http://localhost:8180}
      realm: ${keycloak.admin-client.realm:mdqr-admin}
      client-id: ${keycloak.admin-client.client-id:mdqradminservice}
      client-secret: ${keycloak.admin-client.client-secret:mdqradminservice-secret}
      grant-type: ${keycloak.admin-client.grant-type:client_credentials}
  audit:
    # Shared secret presented by Keycloak HTTP Event Listener in X-Keycloak-Secret header.
    # The push webhook endpoint (/admin/audit/keycloak) is retained but NOT the active ingestion
    # path. Active ingestion is via polling below. Secret kept for backwards compatibility.
    keycloak-secret: ${audit.keycloak-secret:dev-keycloak-secret}
    # Hard cap on rows returned by /audit/export to protect memory.
    export-max-rows: ${audit.export-max-rows:50000}
    keycloak-poll:
      # Periodic polling of Keycloak Admin API for LOGIN/LOGOUT events.
      enabled: true
      interval-ms: 60000
      max-events-per-cycle: 200

# ─── Audit commons (in-process: admin-service persists directly, no HTTP hop) ───
audit:
  sink-mode: in-process
