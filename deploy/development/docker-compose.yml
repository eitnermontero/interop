# Stack de DEVELOPMENT — apps (gateway, base-service, admin) + frontends (admin, public).
#
# Las tools (Consul, Redis, Vault, Keycloak) viven en deploy/tools/ y se
# conectan via IP del host. Levantar primero deploy/tools/ y luego este stack.
#
# Las apps usan extra_hosts para resolver host.docker.internal (Linux: maps a
# host-gateway). En el .env, las URLs de tools apuntan a host.docker.internal.
name: ${HUB_STACK_NAME:-hub-dev}

# Red externa compartida — debe existir ANTES de levantar el stack.
# Crearla una sola vez con:
#   docker network create --driver bridge --opt com.docker.network.driver.mtu=1500 hub-shared
# Override del nombre con HUB_SHARED_NETWORK en .env.
networks:
  hub_net:
    name: ${HUB_NETWORK_NAME:-hub-net}
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "${HUB_NETWORK_MTU:-1500}"
  hub_shared:
    name: ${HUB_SHARED_NETWORK:-hub-shared}
    external: true

services:
  gateway:
    extends:
      file: ../services/001-gateway.yml
      service: hub-gateway
    container_name: hub-gateway${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
      - hub_shared
    ports:
      - "${HUB_GATEWAY_PORT:-0.0.0.0:8000}:8080"
    environment:
      LOG_FILE: gateway.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubgateway${TENANT_ID:+-}${TENANT_ID}-1
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-gateway${TENANT_ID:+-}${TENANT_ID}

  base-service:
    extends:
      file: ../services/002-base-service.yml
      service: hub-base-service
    container_name: hub-base-service${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
      - hub_shared
    ports:
      - "${HUB_BASE_PORT:-127.0.0.1:8002}:8081"
    environment:
      LOG_FILE: base-service.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubbaseservice${TENANT_ID:+-}${TENANT_ID}-1
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-base-service${TENANT_ID:+-}${TENANT_ID}

  admin-service:
    extends:
      file: ../services/003-admin-service.yml
      service: hub-admin-service
    container_name: hub-admin-service${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
      - hub_shared
    ports:
      - "${HUB_ADMIN_PORT:-127.0.0.1:8001}:8083"
    environment:
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubadminservice${TENANT_ID:+-}${TENANT_ID}-1
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-admin-service${TENANT_ID:+-}${TENANT_ID}

  # Frontend
  admin-fe:
    extends:
      file: ../services/100-admin-fe.yml
      service: hub-admin-fe
    container_name: hub-admin-fe${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
    ports:
      - "${HUB_ADMIN_FE_PORT:-0.0.0.0:3000}:80"

  public-fe:
    extends:
      file: ../services/101-public-fe.yml
      service: hub-public-fe
    container_name: hub-public-fe${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
    ports:
      - "${HUB_PUBLIC_FE_PORT:-0.0.0.0:3001}:80"
