    # ═══════════════════════════════════════════════════════════════════════════
    # HUB Hub de Interoperabilidad — Partner API
    #
    # Incluir dentro del bloque server {} de desarrollo.felcn.gob.bo con:
    #   include /srv/interop/deploy/nginx/partner-locations.conf;
    #
    # El upstream hub_gateway debe declararse FUERA del server block:
    #
    #   upstream hub_gateway {
    #       server 127.0.0.1:8088;     # HTTP — el gateway (perfil dev/staging)
    #       keepalive 32;              # no tiene listener HTTPS propio; nginx
    #   }                              # ya termina el TLS/mTLS real del partner.
    #
    # REQUISITO PREVIO — agregar al bloque server (una sola vez):
    #   ssl_client_certificate /srv/interop/deploy/certs/vault-ca-chain.crt;
    #   ssl_verify_client      optional;
    #   ssl_verify_depth       2;
    #
    # Ruta completa del flujo (mTLS activo):
    #   Partner → nginx (verifica cert cliente) → gateway (reenvía cert en header)
    #   → Keycloak (emite JWT con cnf.x5t#S256) → MtlsCertBindingFilter (valida binding)
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Token OAuth2 (grant_type=client_credentials) ──────────────────────────
    # El certificado de cliente es REQUERIDO: Keycloak lo usa para emitir el
    # JWT con claim cnf.x5t#S256 (RFC 8705 certificate-bound token).
    location = /interop/oauth2/token {
        if ($ssl_client_verify != "SUCCESS") {
            return 403 '{"error":"client_certificate_required","description":"mTLS certificate required to obtain a partner token"}';
        }
        proxy_pass              http://hub_gateway/oauth2/token;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        # Inyectar el certificado del partner (PEM URL-encoded) para que Keycloak
        # pueda calcular y enlazar el thumbprint SHA-256 al JWT (cnf.x5t#S256).
        proxy_set_header        X-SSL-Client-Cert   $ssl_client_escaped_cert;
        proxy_http_version      1.1;
        proxy_set_header        Connection          "";
        proxy_read_timeout      30s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;
        add_header Content-Type application/json always;
    }

    # ── APIs de negocio partner ────────────────────────────────────────────────
    # El certificado de cliente es REQUERIDO: MtlsCertBindingFilter verifica que
    # el thumbprint del cert coincide con el claim cnf.x5t#S256 del JWT.
    location ^~ /interop/v1/ {
        if ($ssl_client_verify != "SUCCESS") {
            return 403 '{"success":false,"status":403,"error":{"code":"MTLS_REQUIRED","message":"Client certificate required for partner API access"}}';
        }
        proxy_pass              http://hub_gateway/partner/v1/;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        # Inyectar el certificado del partner para que MtlsCertBindingFilter
        # pueda calcular y comparar el thumbprint (RFC 8705).
        proxy_set_header        X-SSL-Client-Cert   $ssl_client_escaped_cert;
        proxy_http_version      1.1;
        proxy_set_header        Connection          "";
        proxy_read_timeout      60s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
    }

    # ── Swagger UI estático para partners ─────────────────────────────────────
    # Sin mTLS: el Swagger es documentación pública para el partner.
    location ^~ /interop/docs/ {
        alias   /srv/interop/deploy/nginx/partner-docs/;
        index   index.html;
        try_files $uri $uri/ /interop/docs/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }
