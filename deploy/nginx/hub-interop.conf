# ─── HUB Hub de Interoperabilidad — nginx reverse proxy ──────────────────────
#
# Arquitectura de puertos / rutas (corregido 2026-07-14 — ver nota más abajo):
#   nginx :80        → gateway :8444 HTTPS  — admin SPA + browser (sin cert cliente)
#   nginx :443       → gateway :8088 HTTP   — Partner API pública (real, ver
#                       partner-locations.conf, incluido más abajo)
#                       /interop/oauth2/token  → /oauth2/token   (obtener token)
#                       /interop/v1/**          → /partner/v1/**  (APIs de negocio)
#                       /interop/docs/          → swagger estático (sin mTLS)
#
# Partners usan (prefijo REAL — coincide con deploy/partner-delivery/GUIA_INTEGRACION.md
# y con deploy/nginx/partner-docs/openapi.json, ambos ya entregados al partner):
#   https://desarrollo.felcn.gob.bo/interop/oauth2/token                      → obtener access_token
#   https://desarrollo.felcn.gob.bo/interop/v1/inbound/CASO_PENAL/v1          → registrar caso penal
#   https://desarrollo.felcn.gob.bo/interop/v1/inbound/CASO_PENAL/v1/{id}     → actualizar caso penal
#   https://desarrollo.felcn.gob.bo/interop/v1/inbound/OPERATIVO/v1          → consultar operativos
#   https://desarrollo.felcn.gob.bo/interop/v1/inbound/SEGUIMIENTO/v1        → consultar seguimientos
#   https://desarrollo.felcn.gob.bo/interop/docs/                            → Swagger de referencia
#
# NOTA (2026-07-14): este archivo tenía un prefijo /api/partner/... y un upstream
# HTTPS :8444 que quedaron desalineados de la config real usada para el
# onboarding de fiscalia-bol-api (deploy/nginx/partner-locations.conf, prefijo
# /interop/..., upstream HTTP :8088 — ver fix 241f894). Se corrigió incluyendo
# partner-locations.conf como fuente única de verdad en vez de duplicar sus
# location blocks aquí (evita que ambos archivos vuelvan a divergir).
#
# La validación mTLS real (cnf.x5t#S256) la hace el bloque HUB_MTLS_TEST_MODE
# del gateway; nginx termina el mTLS de partner (ssl_client_certificate más
# abajo) y reenvía el certificado con X-SSL-Client-Cert (ver partner-locations.conf).
#
# Instalar:
#   sudo cp deploy/nginx/hub-interop.conf /etc/nginx/sites-available/hub-interop
#   sudo ln -s /etc/nginx/sites-available/hub-interop /etc/nginx/sites-enabled/hub-interop
#   sudo mkdir -p /etc/nginx/ssl/desarrollo.felcn.gob.bo
#   # Copiar certificado TLS del dominio en ese directorio (ver abajo)
#   sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# Admin SPA / browser (sin cert cliente) — sin cambios, gateway HTTPS interno.
upstream hub_gateway_admin {
    server 127.0.0.1:8444;
    keepalive 32;
}

# Partner API — HTTP plano al gateway (nginx ya terminó TLS+mTLS del partner).
# Nombre "hub_gateway" exigido tal cual por partner-locations.conf (ver su cabecera).
upstream hub_gateway {
    server 127.0.0.1:8088;
    keepalive 32;
}

# ─── HTTP :80 → proxy al gateway HTTPS (para admin SPA y browsers) ────────────
server {
    listen 80;
    server_name 172.16.76.20;

    # Proxy a gateway HTTPS. nginx no verifica el cert del gateway porque es
    # auto-firmado (CA interna). Los browsers se conectan aquí sin cert de cliente.
    location / {
        proxy_pass              https://hub_gateway_admin;
        proxy_ssl_verify        off;
        proxy_ssl_session_reuse on;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      60s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
    }
}

# ─── HTTPS :443 — Partner API pública bajo desarrollo.felcn.gob.bo ────────────
#
# Certificado TLS del dominio:
#   /etc/nginx/ssl/desarrollo.felcn.gob.bo/fullchain.pem  (cert + intermedias)
#   /etc/nginx/ssl/desarrollo.felcn.gob.bo/privkey.pem
#
# Si es Let's Encrypt: ajustar rutas a /etc/letsencrypt/live/desarrollo.felcn.gob.bo/
# Si es cert corporativo: copiar los archivos al directorio indicado.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name desarrollo.felcn.gob.bo;

    ssl_certificate     /etc/nginx/ssl/desarrollo.felcn.gob.bo/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/desarrollo.felcn.gob.bo/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL_PARTNER:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── mTLS de partner (requisito de partner-locations.conf — ver su cabecera) ──
    # 'optional': nginx acepta la conexión sin cert y deja que cada location
    # decida (todas las de negocio devuelven 403 si $ssl_client_verify != SUCCESS;
    # /interop/docs/ es pública y no lo exige).
    ssl_client_certificate /srv/interop/deploy/certs/vault-ca-chain.crt;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    # Cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Token endpoint + APIs de negocio + Swagger de partner: ver
    # deploy/nginx/partner-locations.conf (única fuente de verdad de estas
    # rutas — no duplicar location blocks aquí, ya causó desalineación una vez).
    include /srv/interop/deploy/nginx/partner-locations.conf;
}
