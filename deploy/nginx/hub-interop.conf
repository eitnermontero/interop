# ─── HUB Hub de Interoperabilidad — nginx reverse proxy ──────────────────────
#
# Arquitectura de puertos / rutas:
#   nginx :80        → gateway :8444 HTTPS  — admin SPA + browser (sin cert cliente)
#   nginx :443       → gateway :8444 HTTPS  — Partner API pública
#                       /api/partner/oauth2/token  → /oauth2/token   (obtener token)
#                       /api/partner/v1/**          → /partner/v1/**  (APIs de negocio)
#
# Partners usan:
#   https://desarrollo.felcn.gob.bo/api/partner/oauth2/token                      → obtener access_token
#   https://desarrollo.felcn.gob.bo/api/partner/v1/inbound/CASO_PENAL/v1          → registrar caso penal
#   https://desarrollo.felcn.gob.bo/api/partner/v1/inbound/CASO_PENAL/v1/{id}     → actualizar caso penal
#
# nginx actúa como reverse proxy HTTPS → HTTPS al gateway (cert interno, verify off).
# La validación mTLS real (cnf.x5t#S256) está en HUB_MTLS_TEST_MODE=true por ahora.
# Cuando se habilite mTLS real, descomentar los bloques ssl_client_certificate y
# ssl_verify_client, y agregar proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert.
#
# Instalar:
#   sudo cp deploy/nginx/hub-interop.conf /etc/nginx/sites-available/hub-interop
#   sudo ln -s /etc/nginx/sites-available/hub-interop /etc/nginx/sites-enabled/hub-interop
#   sudo mkdir -p /etc/nginx/ssl/desarrollo.felcn.gob.bo
#   # Copiar certificado TLS del dominio en ese directorio (ver abajo)
#   sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

upstream hub_gateway {
    server 127.0.0.1:8444;
    keepalive 32;
}

# ─── HTTP :80 → proxy al gateway HTTPS (para admin SPA y browsers) ────────────
server {
    listen 80;
    server_name 172.16.76.20;

    # Proxy a gateway HTTPS. nginx no verifica el cert del gateway porque es
    # auto-firmado (CA interna). Los browsers se conectan aquí sin cert de cliente.
    location / {
        proxy_pass              https://hub_gateway;
        proxy_ssl_verify        off;
        proxy_ssl_session_reuse on;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      60s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
    }
}

# ─── HTTPS :443 — Partner API pública bajo desarrollo.felcn.gob.bo ────────────
#
# Certificado TLS del dominio:
#   /etc/nginx/ssl/desarrollo.felcn.gob.bo/fullchain.pem  (cert + intermedias)
#   /etc/nginx/ssl/desarrollo.felcn.gob.bo/privkey.pem
#
# Si es Let's Encrypt: ajustar rutas a /etc/letsencrypt/live/desarrollo.felcn.gob.bo/
# Si es cert corporativo: copiar los archivos al directorio indicado.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name desarrollo.felcn.gob.bo;

    ssl_certificate     /etc/nginx/ssl/desarrollo.felcn.gob.bo/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/desarrollo.felcn.gob.bo/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL_PARTNER:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── mTLS real (habilitar cuando HUB_MTLS_TEST_MODE=false) ──────────────
    # ssl_client_certificate /srv/interop/deploy/certs/ca.crt;
    # ssl_verify_client      optional;   # 'on' = obligatorio, 'optional' = tolera sin cert
    # ssl_verify_depth       2;
    # ────────────────────────────────────────────────────────────────────────

    # Cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Token endpoint: obtener access_token ─────────────────────────────────
    # POST https://desarrollo.felcn.gob.bo/api/partner/oauth2/token
    #      → gateway POST /oauth2/token → Keycloak realm hub-partner
    location = /api/partner/oauth2/token {
        # ── mTLS real: pasar cert de cliente al gateway cuando esté habilitado ──
        # proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
        # ─────────────────────────────────────────────────────────────────────

        proxy_pass              https://hub_gateway/oauth2/token;
        proxy_ssl_verify        off;
        proxy_ssl_session_reuse on;
        proxy_ssl_name          hub-gateway;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_read_timeout      30s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;
    }

    # ── Partner APIs de negocio ───────────────────────────────────────────────
    # POST https://desarrollo.felcn.gob.bo/api/partner/v1/inbound/CASO_PENAL/v1
    #      → gateway POST /partner/v1/inbound/CASO_PENAL/v1 → hub-base-service
    location /api/partner/ {
        # ── mTLS real: pasar cert de cliente al gateway cuando esté habilitado ──
        # proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
        # ─────────────────────────────────────────────────────────────────────

        proxy_pass              https://hub_gateway/partner/;
        proxy_ssl_verify        off;
        proxy_ssl_session_reuse on;
        proxy_ssl_name          hub-gateway;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_read_timeout      60s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
    }
}
