name: ${HUB_STACK_NAME:-hub-prod-services}

# -----------------------------------------------------------------------------
# Multi-host deploy model:
#   - Default: 1 nodo por host (gateway + base-service). NODE_INDEX define
#     el numero de nodo del host (server1=1, server2=2, ...). Un balanceador
#     externo (nginx, etc) reparte trafico entre los gateways de cada host.
#   - El service-name en Consul NO lleva el indice — los N nodos comparten
#     el mismo servicio logico, asi el discovery + LB interno funcionan.
#   - Nodos extra en el mismo host (escala vertical): activar profiles
#     gateway-extra / base-extra y setear NODE_INDEX_*_EXTRA.
#
#   Multi-tenant: TENANT_ID se propaga a container_name, hostname, Consul,
#   realm Keycloak, namespace Vault, DB y logs (ver deploy/development/README.md).
# -----------------------------------------------------------------------------

networks:
  hub_net:
    name: ${HUB_NETWORK_NAME:-hub-prod-net}
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "${HUB_NETWORK_MTU:-1500}"

services:
  gateway:
    extends:
      file: ../services/001-gateway.yml
      service: hub-gateway
    container_name: hub-gateway${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}
    networks:
      - hub_net
    ports:
      # 8443 — HTTPS/mTLS (partners + admin via nginx)
      - "${HUB_GATEWAY_PORT:-0.0.0.0:8443}:8443"
      # 8080 — management HTTP (healthcheck Docker/Consul, solo localhost)
      - "${HUB_GATEWAY_MGMT_PORT:-127.0.0.1:8080}:8080"
    environment:
      LOG_FILE: gateway-${NODE_INDEX:-1}.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubgateway${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-gateway${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}

  base-service:
    extends:
      file: ../services/002-base-service.yml
      service: hub-base-service
    container_name: hub-base-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}
    networks:
      - hub_net
    ports:
      - "${HUB_BASE_PORT:-0.0.0.0:8084}:8081"
    environment:
      LOG_FILE: base-service-${NODE_INDEX:-1}.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubbaseservice${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-base-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}

  # ---------------------------------------------------------------------------
  # Nodos extra en el mismo host (opt-in via COMPOSE_PROFILES).
  # Setear NODE_INDEX_*_EXTRA al numero correspondiente para no chocar con
  # NODE_INDEX de otros hosts (ej: server1 usa 1, server2 usa 2, extras 3+).
  # Profiles: gateway-extra, base-extra, admin-extra
  # ---------------------------------------------------------------------------

  gateway-extra:
    extends:
      file: ../services/001-gateway.yml
      service: hub-gateway
    container_name: hub-gateway${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_GATEWAY_EXTRA:-99}
    profiles: ["gateway-extra"]
    networks:
      - hub_net
    ports:
      - "${HUB_GATEWAY_PORT_EXTRA:-0.0.0.0:8446}:8443"
    environment:
      LOG_FILE: gateway-${NODE_INDEX_GATEWAY_EXTRA:-99}.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubgateway${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_GATEWAY_EXTRA:-99}
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-gateway${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_GATEWAY_EXTRA:-99}

  base-service-extra:
    extends:
      file: ../services/002-base-service.yml
      service: hub-base-service
    container_name: hub-base-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_BASE_EXTRA:-99}
    profiles: ["base-extra"]
    networks:
      - hub_net
    environment:
      LOG_FILE: base-service-${NODE_INDEX_BASE_EXTRA:-99}.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubbaseservice${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_BASE_EXTRA:-99}
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-base-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_BASE_EXTRA:-99}

  admin-service:
    extends:
      file: ../services/003-admin-service.yml
      service: hub-admin-service
    container_name: hub-admin-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}
    networks:
      - hub_net
    ports:
      - "${HUB_ADMIN_PORT:-0.0.0.0:8083}:8083"
    environment:
      LOG_FILE: admin-service-${NODE_INDEX:-1}.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubadminservice${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-admin-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX:-1}

  admin-service-extra:
    extends:
      file: ../services/003-admin-service.yml
      service: hub-admin-service
    container_name: hub-admin-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_ADMIN_EXTRA:-99}
    profiles: ["admin-extra"]
    networks:
      - hub_net
    environment:
      LOG_FILE: admin-service-${NODE_INDEX_ADMIN_EXTRA:-99}.log
      SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID: hubadminservice${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_ADMIN_EXTRA:-99}
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: hub-admin-service${TENANT_ID:+-}${TENANT_ID}-${NODE_INDEX_ADMIN_EXTRA:-99}

  admin-fe:
    extends:
      file: ../services/100-admin-fe.yml
      service: hub-admin-fe
    container_name: hub-admin-fe${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
    ports:
      - "${HUB_ADMIN_FE_PORT:-0.0.0.0:8081}:80"

  public-fe:
    extends:
      file: ../services/101-public-fe.yml
      service: hub-public-fe
    container_name: hub-public-fe${TENANT_ID:+-}${TENANT_ID}
    networks:
      - hub_net
    ports:
      - "${HUB_PUBLIC_FE_PORT:-0.0.0.0:8082}:80"
