services:
  hub-admin-fe:
    image: ${HUB_ADMIN_FE_IMAGE:-cr.sintesis.com.bo/hub-dev/hub-admin-fe}:${HUB_ADMIN_FE_VERSION:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${HUB_ADMIN_FE_MEM_LIMIT:-128M}
        reservations:
          memory: ${HUB_ADMIN_FE_MEM_RESERVATION:-32M}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: America/La_Paz
      APP_API_URL: ${APP_API_URL:-}
      APP_KEYCLOAK_URL: ${APP_KEYCLOAK_URL:-}
      APP_KEYCLOAK_REALM: ${APP_KEYCLOAK_REALM:-}
      APP_KEYCLOAK_CLIENT_ID: ${APP_KEYCLOAK_CLIENT_ID:-hub-admin-fe}
      # Context-path runtime (sin rebuild): '/' = raiz, '/hubadmin/' = bajo subpath.
      APP_BASE_PATH: ${HUB_ADMIN_FE_BASE_PATH:-/}
      APP_NAME: ${APP_NAME:-HUB Admin}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health || exit 1"]
      interval: ${HUB_HC_WEB_INTERVAL:-30s}
      timeout: ${HUB_HC_WEB_TIMEOUT:-5s}
      retries: ${HUB_HC_WEB_RETRIES:-3}
      start_period: ${HUB_HC_WEB_START_PERIOD:-10s}
