services:
  hub-base-service:
    image: ${HUB_BASE_IMAGE:-cr.sintesis.com.bo/hub-dev/hub-base-service}:${HUB_BASE_VERSION:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${HUB_BASE_MEM_LIMIT:-1024M}
        reservations:
          memory: ${HUB_BASE_MEM_RESERVATION:-512M}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${LOG_DIR:-~/logs/hub}${TENANT_ID:+-}${TENANT_ID}/base-service/:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/La_Paz
      TENANT_ID: ${TENANT_ID:-}

      # --- JVM ---
      _JAVA_OPTIONS: ${HUB_BASE_JAVA_OPTS:-}

      # --- Spring profile ---
      SPRING_PROFILES_ACTIVE: ${HUB_BASE_PROFILE:-dev}

      # --- Server ---
      SERVER_PORT: 8081

      # --- Service discovery (Consul) ---
      SPRING_CLOUD_CONSUL_HOST: ${HUB_CONSUL_HOST:-host.docker.internal}
      SPRING_CLOUD_CONSUL_PORT: ${HUB_CONSUL_PORT:-8500}
      SPRING_CLOUD_CONSUL_SCHEME: ${HUB_CONSUL_SCHEME:-http}
      SPRING_CLOUD_CONSUL_TOKEN: ${HUB_CONSUL_TOKEN:-}
      SPRING_CLOUD_CONSUL_DISCOVERY_SERVICE_NAME: hubbaseservice${TENANT_ID:+-}${TENANT_ID}
      SPRING_CLOUD_CONSUL_CONFIG_ENABLED: ${HUB_CONSUL_CONFIG_ENABLED:-false}
      SPRING_CLOUD_CONSUL_CONFIG_FORMAT: files
      SPRING_CLOUD_CONSUL_CONFIG_PROFILE_SEPARATOR: "-"
      SPRING_CLOUD_CONSUL_CONFIG_PREFIXES: ${HUB_BASE_CONSUL_CONTEXT:-config/base-service}
      # Consul external (otra Docker network) no alcanza el IP interno del container, asi que
      # desactivamos el HTTP active check. La service queda registrada en el catalog pero sin
      # health-check.
      SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER_HEALTH_CHECK: "false"

      # --- Vault ---
      SPRING_CLOUD_VAULT_HOST: ${HUB_VAULT_HOST:-host.docker.internal}
      SPRING_CLOUD_VAULT_PORT: ${HUB_VAULT_PORT:-8200}
      SPRING_CLOUD_VAULT_SCHEME: ${HUB_VAULT_SCHEME:-http}
      SPRING_CLOUD_VAULT_AUTHENTICATION: ${HUB_VAULT_AUTHENTICATION:-TOKEN}
      SPRING_CLOUD_VAULT_TOKEN: ${HUB_VAULT_TOKEN:-root}
      SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID: ${HUB_VAULT_ROLE_ID:-}
      SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID: ${HUB_VAULT_SECRET_ID:-}
      # Namespace tenant-aware: secret/hub[-<tenant>]/...
      # Env names = property path en MAYUSCULAS (Spring Boot relaxed binding).
      SPRING_CLOUD_VAULT_KV_DEFAULT_CONTEXT: ${HUB_VAULT_NAMESPACE_BASE:-hub}${TENANT_ID:+-}${TENANT_ID}
      SPRING_CLOUD_VAULT_KV_APPLICATION_NAME: ${HUB_VAULT_NAMESPACE_BASE:-hub}${TENANT_ID:+-}${TENANT_ID}
      # KV mount: 'secret' (dev) o 'kv' (stage, vault cluster monta kv/).
      SPRING_CLOUD_VAULT_KV_BACKEND: ${HUB_VAULT_KV_BACKEND:-secret}
      # Namespace tenant-aware para los config.import de Vault (ver application.yml).
      HUB_VAULT_NS: ${HUB_BASE_VAULT_NS:-hub-base}${TENANT_ID:+-}${TENANT_ID}
      # Mount KV de Vault para los config.import (dev=secret, stage=kv).
      HUB_VAULT_MOUNT: ${HUB_VAULT_MOUNT:-secret}
      # VAULT_NS y VAULT_MOUNT son leídos directamente por ${VAULT_NS:...} en application.yml
      VAULT_NS: ${HUB_BASE_VAULT_NS:-hub-base}${TENANT_ID:+-}${TENANT_ID}
      VAULT_MOUNT: ${HUB_VAULT_MOUNT:-secret}

      # --- Database (PostgreSQL) ---
      SPRING_DATASOURCE_URL: ${HUB_BASE_DB_URL:-jdbc:postgresql://host.docker.internal:5432/hub_interop}
      SYSTEM_DATABASE_USERNAME: ${HUB_BASE_DB_USERNAME:-hub}
      SYSTEM_DATABASE_PASSWORD: ${HUB_BASE_DB_PASSWORD:-}
      SPRING_LIQUIBASE_ENABLED: ${HUB_BASE_LIQUIBASE_ENABLED:-true}

      # --- Redis ---
      # base-service usa system.redis.* para AMBOS: Spring Data y Redisson (L2 cache).
      SYSTEM_REDIS_HOST: ${HUB_REDIS_HOST:-host.docker.internal}
      SYSTEM_REDIS_PORT: ${HUB_REDIS_PORT:-6379}
      # password (clave) -> Vault secret/<ns>/system/redis. NO en env.
      # Redisson L2 cluster (stage): "redis://host:port,..."; vacio = single (dev).
      SYSTEM_REDIS_NODES: ${HUB_REDIS_NODES:-}
      # Spring Data: standalone (dev) o cluster. El bean LettuceConnectionFactory custom
      # (CacheConfiguration) elige segun HUB_REDIS_CLUSTER_ENABLED=true + HUB_REDIS_CLUSTER_NODES.
      APPLICATION_REDIS_CLUSTER_ENABLED: ${HUB_REDIS_CLUSTER_ENABLED:-false}
      APPLICATION_REDIS_CLUSTER_NODES: ${HUB_REDIS_CLUSTER_NODES:-}

      # --- Keycloak / OIDC ---
      # keycloak.service-client.* publican via Vault; aqui las dejamos overrideables por env.
      KEYCLOAK_SERVICE_CLIENT_AUTH_SERVER_URL: ${HUB_KEYCLOAK_URL:-http://host.docker.internal:8180}
      KEYCLOAK_SERVICE_CLIENT_REALM: ${HUB_KEYCLOAK_REALM_BASE:-hub-admin}${TENANT_ID:+-}${TENANT_ID}
      APPLICATION_KEYCLOAK_REALM: ${HUB_KEYCLOAK_REALM_BASE:-hub-admin}${TENANT_ID:+-}${TENANT_ID}

      # --- Audit (cliente; apunta al admin-service receptor) ---
      AUDIT_ENDPOINT: ${HUB_AUDIT_ENDPOINT:-http://hub-gateway${TENANT_ID:+-}${TENANT_ID}:8080/services/hubadminservice/admin/audit}
      # JWT client_credentials. Reusa el client hub-api (keycloak.service-client.*).
      AUDIT_OAUTH_TOKEN_URI: ${HUB_AUDIT_OAUTH_TOKEN_URI:-${HUB_KEYCLOAK_URL:-http://host.docker.internal:8180}/realms/${HUB_KEYCLOAK_REALM_BASE:-hub}${TENANT_ID:+-}${TENANT_ID}/protocol/openid-connect/token}
      AUDIT_OAUTH_CLIENT_ID: ${HUB_AUDIT_OAUTH_CLIENT_ID:-hub-api}
      # client-secret (clave) -> Vault keycloak/service-client; audit.oauth.client-secret
      # encadena con keycloak.service-client.client-secret en el yml. NO en env.
      AUDIT_SCOPE: ${HUB_AUDIT_SCOPE:-audit:write}

      # --- Logging ---
      # LOG_DIR + LOG_FILE los lee logback-spring.xml para el RollingFileAppender.
      LOG_DIR: /app/logs
      LOG_FILE: base-service.log
      LOGGING_LEVEL_ROOT: ${HUB_BASE_ROOT_LOG_LEVEL:-INFO}
      LOGGING_LEVEL_BO_COM_SINTESIS_HUB_BASE: ${HUB_BASE_LOG_LEVEL:-INFO}
      # Hibernate puede inundar el log con SELECTs en dev. Default WARN.
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: ${HUB_BASE_LOG_LEVEL_HIBERNATE_SQL:-WARN}
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL: ${HUB_BASE_LOG_LEVEL_HIBERNATE_BIND:-WARN}
      LOGGING_LOGBACK_ROLLINGPOLICY_MAX_FILE_SIZE: ${HUB_LOG_MAX_FILE_SIZE:-500MB}
      LOGGING_LOGBACK_ROLLINGPOLICY_MAX_HISTORY: ${HUB_LOG_MAX_HISTORY:-90}

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/management/health | grep -q '\"status\":\"UP\"'"]
      interval: ${HUB_HC_API_INTERVAL:-30s}
      timeout: ${HUB_HC_API_TIMEOUT:-10s}
      retries: ${HUB_HC_API_RETRIES:-3}
      start_period: ${HUB_HC_API_START_PERIOD:-60s}
