services:
  mdqr-decode-service:
    image: ${MDQR_DECRYPT_IMAGE:-cr.sintesis.com.bo/mdqr-dev/mdqr-decode-service}:${MDQR_DECRYPT_VERSION:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MDQR_DECRYPT_MEM_LIMIT:-1024M}
        reservations:
          memory: ${MDQR_DECRYPT_MEM_RESERVATION:-512M}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${LOG_DIR:-~/logs/mdqr}${TENANT_ID:+-}${TENANT_ID}/decrypt-service/:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/La_Paz
      TENANT_ID: ${TENANT_ID:-}

      # --- JVM ---
      _JAVA_OPTIONS: ${MDQR_DECRYPT_JAVA_OPTS:-}

      # --- Spring profile ---
      SPRING_PROFILES_ACTIVE: ${MDQR_DECRYPT_PROFILE:-dev}

      # --- Server ---
      SERVER_PORT: 8081

      # --- Service discovery (Consul) ---
      SPRING_CLOUD_CONSUL_HOST: ${MDQR_CONSUL_HOST:-host.docker.internal}
      SPRING_CLOUD_CONSUL_PORT: ${MDQR_CONSUL_PORT:-8500}
      SPRING_CLOUD_CONSUL_SCHEME: ${MDQR_CONSUL_SCHEME:-http}
      SPRING_CLOUD_CONSUL_TOKEN: ${MDQR_CONSUL_TOKEN:-}
      SPRING_CLOUD_CONSUL_DISCOVERY_SERVICE_NAME: mdqrbaseservice${TENANT_ID:+-}${TENANT_ID}
      SPRING_CLOUD_CONSUL_CONFIG_ENABLED: ${MDQR_CONSUL_CONFIG_ENABLED:-false}
      SPRING_CLOUD_CONSUL_CONFIG_FORMAT: files
      SPRING_CLOUD_CONSUL_CONFIG_PROFILE_SEPARATOR: "-"
      SPRING_CLOUD_CONSUL_CONFIG_PREFIXES: ${MDQR_DECRYPT_CONSUL_CONTEXT:-config/decrypt-service}
      # Consul external (otra Docker network) no alcanza el IP interno del container, asi que
      # desactivamos el HTTP active check. La service queda registrada en el catalog pero sin
      # health-check.
      SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER_HEALTH_CHECK: "false"

      # --- Vault ---
      SPRING_CLOUD_VAULT_HOST: ${MDQR_VAULT_HOST:-host.docker.internal}
      SPRING_CLOUD_VAULT_PORT: ${MDQR_VAULT_PORT:-8200}
      SPRING_CLOUD_VAULT_SCHEME: ${MDQR_VAULT_SCHEME:-http}
      SPRING_CLOUD_VAULT_AUTHENTICATION: ${MDQR_VAULT_AUTHENTICATION:-TOKEN}
      SPRING_CLOUD_VAULT_TOKEN: ${MDQR_VAULT_TOKEN:-root}
      SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID: ${MDQR_VAULT_ROLE_ID:-}
      SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID: ${MDQR_VAULT_SECRET_ID:-}
      # Namespace tenant-aware: secret/mdqr[-<tenant>]/...
      # Env names = property path en MAYUSCULAS (Spring Boot relaxed binding).
      SPRING_CLOUD_VAULT_KV_DEFAULT_CONTEXT: ${MDQR_VAULT_NAMESPACE_BASE:-mdqr}${TENANT_ID:+-}${TENANT_ID}
      SPRING_CLOUD_VAULT_KV_APPLICATION_NAME: ${MDQR_VAULT_NAMESPACE_BASE:-mdqr}${TENANT_ID:+-}${TENANT_ID}
      # KV mount: 'secret' (dev) o 'kv' (stage, vault cluster monta kv/).
      SPRING_CLOUD_VAULT_KV_BACKEND: ${MDQR_VAULT_KV_BACKEND:-secret}
      # Namespace tenant-aware para los config.import de Vault (ver application.yml).
      MDQR_VAULT_NS: ${MDQR_DECRYPT_VAULT_NS:-mdqr-decode}${TENANT_ID:+-}${TENANT_ID}
      # Mount KV de Vault para los config.import (dev=secret, stage=kv).
      MDQR_VAULT_MOUNT: ${MDQR_VAULT_MOUNT:-secret}
      # VAULT_NS y VAULT_MOUNT son leídos directamente por ${VAULT_NS:...} en application.yml
      VAULT_NS: ${MDQR_DECRYPT_VAULT_NS:-mdqr-decode}${TENANT_ID:+-}${TENANT_ID}
      VAULT_MOUNT: ${MDQR_VAULT_MOUNT:-secret}

      # --- Database (PostgreSQL) ---
      SPRING_DATASOURCE_URL: ${MDQR_DECRYPT_DB_URL:-jdbc:postgresql://host.docker.internal:5432/hub_interop}
      # username/password (claves) -> Vault secret/<ns>/system/database. NO en env.
      SPRING_LIQUIBASE_ENABLED: ${MDQR_DECRYPT_LIQUIBASE_ENABLED:-true}

      # --- Redis ---
      # decrypt usa system.redis.* para AMBOS: Spring Data y Redisson (L2 cache).
      SYSTEM_REDIS_HOST: ${MDQR_REDIS_HOST:-host.docker.internal}
      SYSTEM_REDIS_PORT: ${MDQR_REDIS_PORT:-6379}
      # password (clave) -> Vault secret/<ns>/system/redis. NO en env.
      # Redisson L2 cluster (stage): "redis://host:port,..."; vacio = single (dev).
      SYSTEM_REDIS_NODES: ${MDQR_REDIS_NODES:-}
      # Spring Data: standalone (dev) o cluster. El bean LettuceConnectionFactory custom
      # (CacheConfiguration) elige segun MDQR_REDIS_CLUSTER_ENABLED=true + MDQR_REDIS_CLUSTER_NODES.
      APPLICATION_REDIS_CLUSTER_ENABLED: ${MDQR_REDIS_CLUSTER_ENABLED:-false}
      APPLICATION_REDIS_CLUSTER_NODES: ${MDQR_REDIS_CLUSTER_NODES:-}

      # --- Keycloak / OIDC ---
      # keycloak.service-client.* publican via Vault; aqui las dejamos overrideables por env.
      KEYCLOAK_SERVICE_CLIENT_AUTH_SERVER_URL: ${MDQR_KEYCLOAK_URL:-http://host.docker.internal:8180}
      KEYCLOAK_SERVICE_CLIENT_REALM: ${MDQR_KEYCLOAK_REALM_BASE:-mdqr-admin}${TENANT_ID:+-}${TENANT_ID}
      APPLICATION_KEYCLOAK_REALM: ${MDQR_KEYCLOAK_REALM_BASE:-mdqr-admin}${TENANT_ID:+-}${TENANT_ID}

      # --- Audit (cliente; apunta al admin-service receptor) ---
      AUDIT_ENDPOINT: ${MDQR_AUDIT_ENDPOINT:-http://mdqr-gateway${TENANT_ID:+-}${TENANT_ID}:8080/services/mdqradminservice/admin/audit}
      # JWT client_credentials. Reusa el client mdqr-api (keycloak.service-client.*).
      AUDIT_OAUTH_TOKEN_URI: ${MDQR_AUDIT_OAUTH_TOKEN_URI:-${MDQR_KEYCLOAK_URL:-http://host.docker.internal:8180}/realms/${MDQR_KEYCLOAK_REALM_BASE:-mdqr}${TENANT_ID:+-}${TENANT_ID}/protocol/openid-connect/token}
      AUDIT_OAUTH_CLIENT_ID: ${MDQR_AUDIT_OAUTH_CLIENT_ID:-mdqr-api}
      # client-secret (clave) -> Vault keycloak/service-client; audit.oauth.client-secret
      # encadena con keycloak.service-client.client-secret en el yml. NO en env.
      AUDIT_SCOPE: ${MDQR_AUDIT_SCOPE:-audit:write}

      # --- Logging ---
      # LOG_DIR + LOG_FILE los lee logback-spring.xml para el RollingFileAppender.
      LOG_DIR: /app/logs
      LOG_FILE: decrypt-service.log
      LOGGING_LEVEL_ROOT: ${MDQR_DECRYPT_ROOT_LOG_LEVEL:-INFO}
      LOGGING_LEVEL_BO_COM_SINTESIS_MDQR_BASE: ${MDQR_DECRYPT_LOG_LEVEL:-INFO}
      # Hibernate puede inundar el log con SELECTs en dev. Default WARN.
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: ${MDQR_DECRYPT_LOG_LEVEL_HIBERNATE_SQL:-WARN}
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL: ${MDQR_DECRYPT_LOG_LEVEL_HIBERNATE_BIND:-WARN}
      LOGGING_LOGBACK_ROLLINGPOLICY_MAX_FILE_SIZE: ${MDQR_LOG_MAX_FILE_SIZE:-500MB}
      LOGGING_LOGBACK_ROLLINGPOLICY_MAX_HISTORY: ${MDQR_LOG_MAX_HISTORY:-90}

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/management/health | grep -q '\"status\":\"UP\"'"]
      interval: ${MDQR_HC_API_INTERVAL:-30s}
      timeout: ${MDQR_HC_API_TIMEOUT:-10s}
      retries: ${MDQR_HC_API_RETRIES:-3}
      start_period: ${MDQR_HC_API_START_PERIOD:-60s}
